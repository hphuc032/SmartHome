<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Home — Login</title>
  <!-- Dùng chung font với dashboard -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── CSS Variables — đồng bộ với style.css dashboard ── */
    :root {
      --bg-deep:      #080c12;
      --bg-panel:     #0d1320;
      --bg-card:      #101828;
      --border:       #1e2d45;
      --border-glow:  #2a4a7f;
      --accent-blue:  #1a8cff;
      --accent-cyan:  #00d4ff;
      --accent-green: #00e676;
      --accent-red:   #ff1744;
      --text-primary: #e8f0fe;
      --text-secondary: #8baac8;
      --text-muted:   #4a6480;
      --font-display: 'Rajdhani', sans-serif;
      --font-body:    'Exo 2', sans-serif;
      --font-mono:    'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-deep);
      /* Lưới nền giống dashboard */
      background-image:
        linear-gradient(rgba(26,140,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,140,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Wrapper thẻ login ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(26,140,255,0.06);
      position: relative;
      overflow: hidden;
    }

    /* Đường viền gradient trên cùng thẻ */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    }

    /* ── Logo + Tiêu đề ── */
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo .logo-icon {
      font-size: 2.8rem;
      color: var(--accent-cyan);
      text-shadow: 0 0 16px var(--accent-cyan);
      display: block;
      margin-bottom: 10px;
    }

    .login-logo .title-main {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-primary);
      display: block;
    }

    .login-logo .title-sub {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      display: block;
      margin-top: 4px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(26,140,255,0.12);
      background: rgba(26,140,255,0.04);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    /* ── Nút Login ── */
    .btn-login {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: linear-gradient(135deg, rgba(26,140,255,0.25), rgba(0,212,255,0.15));
      border: 1px solid rgba(26,140,255,0.45);
      border-radius: 9px;
      color: var(--accent-cyan);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, rgba(26,140,255,0.38), rgba(0,212,255,0.25));
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Vùng hiển thị lỗi ── */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 11px 14px;
      background: rgba(255,23,68,0.1);
      border: 1px solid rgba(255,23,68,0.35);
      border-radius: 8px;
      color: var(--accent-red);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .error-box.visible {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading spinner nhỏ trong nút ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer nhỏ ── */
    .login-footer {
      margin-top: 22px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 460px) {
      .login-card { padding: 30px 22px; }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Logo + Tiêu đề -->
    <div class="login-logo">
      <span class="logo-icon">⌂</span>
      <span class="title-main">SMART HOME</span>
      <span class="title-sub">SECURE LOGIN · IOT DASHBOARD</span>
    </div>

    <!-- Form đăng nhập -->
    <div class="form-group">
      <label class="form-label" for="inputEmail">EMAIL</label>
      <input
        class="form-input"
        type="email"
        id="inputEmail"
        placeholder="admin@example.com"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="inputPassword">PASSWORD</label>
      <input
        class="form-input"
        type="password"
        id="inputPassword"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <!-- Nút Login -->
    <button class="btn-login" id="btnLogin" onclick="handleLogin()">
      LOGIN
    </button>

    <!-- Vùng báo lỗi -->
    <div class="error-box" id="errorBox"></div>

    <div class="login-footer">Smart Home IoT Project · ESP32 + Firebase</div>
  </div>

  <!-- Firebase SDK (compat — nhất quán với dashboard) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <!-- Config dùng chung -->
  <script src="firebase-config.js"></script>

  <!-- Logic auth -->
  <script src="auth.js"></script>

</body>
</html>
